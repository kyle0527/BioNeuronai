<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><title>Type — Body</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; }
  .row { display:flex; align-items: baseline; gap: 16px; margin-bottom: 12px; }
  .tag { width: 100px; font-family: var(--font-mono); font-size: 10px; color: var(--muted-foreground); text-transform: uppercase; letter-spacing: .08em; }
  .spec { font-family: var(--font-mono); font-size: 10px; color: var(--muted-foreground); margin-left: auto; }
  p.lead { color: var(--muted-foreground); }
</style></head>
<body>
  <div class="row"><div class="tag">body</div><p>Module availability and health reported by the core inference engine.</p><div class="spec">Inter 14 / 400</div></div>
  <div class="row"><div class="tag">lead</div><p class="lead">Ask questions about trading and market analysis.</p><div class="spec">Inter 16 / 400 • fg2</div></div>
  <div class="row"><div class="tag">small</div><p class="small">Last checked: 2026-04-22 14:32:07</p><div class="spec">Inter 12 / 400 • fg2</div></div>
  <div class="row"><div class="tag">label-caps</div><div class="label-caps">Sentiment Score</div><div class="spec">Inter 12 / 600 • 0.08em</div></div>
</body></html>
