<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><title>Logo</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; }
  .card.light { background: #fff; color: oklch(0.2 0 0); border-color: oklch(0.9 0 0); }
  .brand { font-family: var(--font-mono); font-size: 24px; font-weight: 700; letter-spacing: -0.02em; }
  .sub { font-size: 11px; color: var(--muted-foreground); margin-top: 2px; font-family: var(--font-sans); }
  .card.light .sub { color: oklch(0.45 0.01 250); }
  .tag { font-family: var(--font-mono); font-size: 10px; color: var(--muted-foreground); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 10px; }
  .card.light .tag { color: oklch(0.45 0.01 250); }
</style></head>
<body>
  <div class="card">
    <div class="tag">wordmark · dark</div>
    <div class="brand">BioNeuronAI</div>
    <div class="sub">Trading Operations</div>
  </div>
  <div class="card light">
    <div class="tag">wordmark · light</div>
    <div class="brand">BioNeuronAI</div>
    <div class="sub">Trading Operations</div>
  </div>
  <div class="card" style="grid-column: span 2;">
    <div class="tag">wordmark · sizes</div>
    <div style="display:flex; gap: 24px; align-items:baseline;">
      <div class="brand" style="font-size: 14px;">BioNeuronAI</div>
      <div class="brand" style="font-size: 20px;">BioNeuronAI</div>
      <div class="brand" style="font-size: 32px;">BioNeuronAI</div>
      <div class="brand" style="font-size: 48px;">BioNeuronAI</div>
    </div>
  </div>
</body></html>
