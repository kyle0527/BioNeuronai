<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><title>Spacing & Radius</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .group h5 { font-family: var(--font-mono); font-size: 11px; color: var(--muted-foreground); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 10px; font-weight: 600; }
  .sp-row { display:flex; align-items:center; gap:12px; margin-bottom: 6px; }
  .sp-bar { background: oklch(0.65 0.15 200); height: 10px; border-radius: 2px; }
  .sp-label { font-family: var(--font-mono); font-size: 11px; color: var(--muted-foreground); width: 90px; }
  .rad-row { display:flex; align-items:center; gap:12px; margin-bottom: 8px; }
  .rad-box { width: 44px; height: 30px; background: var(--muted); border: 1px solid var(--border); }
</style></head>
<body>
<div class="group">
  <h5>Spacing Scale</h5>
  <div class="sp-row"><div class="sp-label">space-1 · 4</div><div class="sp-bar" style="width:4px;"></div></div>
  <div class="sp-row"><div class="sp-label">space-2 · 8</div><div class="sp-bar" style="width:8px;"></div></div>
  <div class="sp-row"><div class="sp-label">space-3 · 12</div><div class="sp-bar" style="width:12px;"></div></div>
  <div class="sp-row"><div class="sp-label">space-4 · 16</div><div class="sp-bar" style="width:16px;"></div></div>
  <div class="sp-row"><div class="sp-label">space-6 · 24</div><div class="sp-bar" style="width:24px;"></div></div>
  <div class="sp-row"><div class="sp-label">space-8 · 32</div><div class="sp-bar" style="width:32px;"></div></div>
</div>
<div class="group">
  <h5>Radius Scale</h5>
  <div class="rad-row"><div class="rad-box" style="border-radius:4px;"></div><span class="sp-label">sm · 4</span></div>
  <div class="rad-row"><div class="rad-box" style="border-radius:8px;"></div><span class="sp-label">md · 8 (base)</span></div>
  <div class="rad-row"><div class="rad-box" style="border-radius:12px;"></div><span class="sp-label">lg · 12 (cards)</span></div>
  <div class="rad-row"><div class="rad-box" style="border-radius:16px;"></div><span class="sp-label">xl · 16</span></div>
  <div class="rad-row"><div class="rad-box" style="border-radius:9999px;"></div><span class="sp-label">full · pill</span></div>
</div>
</body></html>
