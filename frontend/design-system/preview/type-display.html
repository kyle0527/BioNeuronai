<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><title>Type — Display</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; }
  .row { display:flex; align-items: baseline; gap: 16px; margin-bottom: 14px; }
  .tag { width: 90px; font-family: var(--font-mono); font-size: 10px; color: var(--muted-foreground); text-transform: uppercase; letter-spacing: .08em; }
  .spec { font-family: var(--font-mono); font-size: 10px; color: var(--muted-foreground); margin-left: auto; }
</style></head>
<body>
  <div class="row"><div class="tag">h1</div><h1>Trade Control</h1><div class="spec">Mono 30 / 700</div></div>
  <div class="row"><div class="tag">h2</div><h2>System Status</h2><div class="spec">Mono 24 / 700</div></div>
  <div class="row"><div class="tag">h3</div><h3>Backtest Catalog</h3><div class="spec">Mono 20 / 700</div></div>
  <div class="row"><div class="tag">h4</div><h4>Recent Runs</h4><div class="spec">Mono 18 / 600</div></div>
</body></html>
