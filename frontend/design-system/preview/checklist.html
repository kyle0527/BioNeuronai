<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><title>Checklist</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 18px; }
  .item { display:flex; align-items:flex-start; gap:10px; padding: 10px 0; border-top: 1px solid var(--border); font-size: 13px; }
  .item:first-child { border-top: none; }
  .name { font-weight: 500; }
  .msg { font-size: 11px; color: var(--muted-foreground); margin-top: 2px; font-family: var(--font-mono); }
  .ico { width: 16px; height:16px; flex-shrink: 0; margin-top: 2px; }
  .ok { color:#22c55e; } .fail { color:#ef4444; } .warn { color:#f59e0b; }
</style></head>
<body>
  <div class="item">
    <svg class="ico ok" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>
    <div><div class="name">Confidence above threshold</div><div class="msg">0.74 ≥ 0.60</div></div>
  </div>
  <div class="item">
    <svg class="ico ok" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>
    <div><div class="name">Drawdown within limits</div><div class="msg">−8.45% &lt; 10% ceiling</div></div>
  </div>
  <div class="item">
    <svg class="ico warn" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 9v4M12 17h.01M10.3 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>
    <div><div class="name">Trade count near cap</div><div class="msg">8 / 10 daily trades</div></div>
  </div>
  <div class="item">
    <svg class="ico fail" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M15 9l-6 6M9 9l6 6"/></svg>
    <div><div class="name">Leverage mismatch</div><div class="msg">requested 12× &gt; 10× account max</div></div>
  </div>
</body></html>
