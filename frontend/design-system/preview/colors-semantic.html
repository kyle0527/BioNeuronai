<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><title>Colors — Semantic</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; display:flex; flex-direction:column; gap:10px; }
  .row { display:grid; grid-template-columns: 120px 1fr 1fr 1fr; gap:10px; align-items:center; }
  .chip { height: 40px; border-radius: var(--radius-md); border: 1px solid var(--border); display:flex; align-items:center; padding-left:10px; font-family: var(--font-mono); font-size:11px; }
  .tinted { font-weight:600; }
  .label { font-size: 12px; color: var(--muted-foreground); text-transform:uppercase; letter-spacing:.06em; font-weight:600; }
</style></head>
<body>
<div class="row">
  <div class="label">success</div>
  <div class="chip" style="background: #22c55e; color: #0a1a10;">solid • #22c55e</div>
  <div class="chip tinted" style="background: rgba(34,197,94,0.10); color: #22c55e; border-color: rgba(34,197,94,0.20);">tinted • 10% bg</div>
  <div class="chip" style="color:#22c55e;">text • pass</div>
</div>
<div class="row">
  <div class="label">destructive</div>
  <div class="chip" style="background: #ef4444; color: #fff;">solid • #ef4444</div>
  <div class="chip tinted" style="background: rgba(239,68,68,0.10); color:#ef4444; border-color: rgba(239,68,68,0.20);">tinted • 10% bg</div>
  <div class="chip" style="color:#ef4444;">text • fail</div>
</div>
<div class="row">
  <div class="label">warning</div>
  <div class="chip" style="background: #f59e0b; color:#1a1206;">solid • #f59e0b</div>
  <div class="chip tinted" style="background: rgba(245,158,11,0.10); color:#f59e0b; border-color: rgba(245,158,11,0.20);">tinted • 10% bg</div>
  <div class="chip" style="color:#f59e0b;">text • warn</div>
</div>
<div class="row">
  <div class="label">info / primary</div>
  <div class="chip" style="background: oklch(0.65 0.15 200); color:#fff;">solid • cyan</div>
  <div class="chip tinted" style="background: color-mix(in oklch, oklch(0.65 0.15 200) 10%, transparent); color: oklch(0.65 0.15 200); border-color: color-mix(in oklch, oklch(0.65 0.15 200) 20%, transparent);">tinted • 10% bg</div>
  <div class="chip" style="color: oklch(0.65 0.15 200);">text • info</div>
</div>
</body></html>
