<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; display:grid; grid-template-columns: 100px 1fr; gap:12px 16px; align-items:center; }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--muted-foreground); text-transform: uppercase; letter-spacing: .08em; }
  .row { display:flex; gap: 8px; flex-wrap:wrap; }
  .btn { display:inline-flex; align-items:center; gap:8px; height:36px; padding: 0 16px; border-radius: var(--radius-md); font-family: var(--font-sans); font-size: 14px; font-weight: 500; border: 1px solid transparent; cursor: pointer; box-shadow: 0 1px 2px rgba(0,0,0,0.25); transition: all .15s; }
  .btn.sm { height: 32px; padding: 0 12px; font-size: 13px; }
  .btn.lg { height: 40px; padding: 0 24px; }
  .btn.icon { width: 36px; padding: 0; justify-content: center; }
  .btn-primary { background: oklch(0.65 0.15 200); color: #fff; }
  .btn-secondary { background: oklch(0.35 0.02 240); color: oklch(0.95 0 0); }
  .btn-outline { background: var(--background); color: var(--foreground); border-color: var(--border); }
  .btn-ghost { background: transparent; color: var(--foreground); box-shadow: none; border-color: transparent; }
  .btn-destructive { background: oklch(0.65 0.20 25); color: #fff; }
</style></head>
<body>
  <div class="lbl">variants</div>
  <div class="row">
    <button class="btn btn-primary">Run Backtest</button>
    <button class="btn btn-secondary">Secondary</button>
    <button class="btn btn-outline">Outline</button>
    <button class="btn btn-ghost">Ghost</button>
    <button class="btn btn-destructive">Stop Trading</button>
  </div>
  <div class="lbl">sizes</div>
  <div class="row">
    <button class="btn btn-primary sm">Small</button>
    <button class="btn btn-primary">Default</button>
    <button class="btn btn-primary lg">Large</button>
    <button class="btn btn-outline icon">⟳</button>
  </div>
  <div class="lbl">states</div>
  <div class="row">
    <button class="btn btn-primary">Default</button>
    <button class="btn btn-primary" style="background: oklch(0.65 0.15 200 / 0.9); outline: 3px solid color-mix(in oklch, oklch(0.65 0.15 200) 50%, transparent);">Focus</button>
    <button class="btn btn-primary" style="opacity: 0.5;" disabled>Disabled</button>
  </div>
</body></html>
