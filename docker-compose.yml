# ============================================================
# BioNeuronAI — docker-compose.yml
#
# Services:
#   api        — REST API server (FastAPI + uvicorn)
#   status     — 快速健康檢查 (CLI)
#   backtest   — 回測歷史數據 (CLI)
#   simulate   — 模擬紙交易 (CLI)
#   trade      — 正式/測試網交易 (需 profile 啟用)
#
# 用法範例:
#   docker compose up api             # 啟動 API server
#   docker compose run --rm status    # CLI 健康檢查
#   docker compose --profile trade up trade
# ============================================================

x-common: &common
  build:
    context: .
    dockerfile: Dockerfile
    target: runtime
  env_file:
    - .env
  volumes:
    - bioneuron-data:/app/data
    - bioneuron-logs:/app/logs
  restart: "no"

services:
  # ---- REST API Server ----
  api:
    <<: *common
    container_name: bioneuron-api
    command: ["-m", "uvicorn", "bioneuronai.api.app:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "${API_PORT:-8000}:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ---- 健康檢查 / 系統狀態 ----
  status:
    <<: *common
    container_name: bioneuron-status
    command: ["main.py", "status"]

  # ---- 新聞情緒分析 ----
  news:
    <<: *common
    container_name: bioneuron-news
    command: ["main.py", "news", "--symbol", "${TRADE_SYMBOL:-BTCUSDT}", "--max-items", "10"]

  # ---- 交易前置檢查 ----
  pretrade:
    <<: *common
    container_name: bioneuron-pretrade
    command: ["main.py", "pretrade", "--symbol", "${TRADE_SYMBOL:-BTCUSDT}", "--action", "${TRADE_ACTION:-long}"]

  # ---- 每日交易計畫 ----
  plan:
    <<: *common
    container_name: bioneuron-plan
    command: ["main.py", "plan", "--output", "/app/data/daily_plan.json"]

  # ---- 回測 ----
  backtest:
    <<: *common
    container_name: bioneuron-backtest
    command: [
      "main.py", "backtest",
      "--symbol",   "${BACKTEST_SYMBOL:-ETHUSDT}",
      "--interval", "${BACKTEST_INTERVAL:-1h}",
      "--start",    "${BACKTEST_START:-2024-01-01}",
      "--end",      "${BACKTEST_END:-2024-12-31}"
    ]
    volumes:
      - bioneuron-data:/app/data
      - bioneuron-logs:/app/logs
      - ./backtesting:/app/backtesting  # 掛載本地回測結果方便查看

  # ---- 模擬紙交易 ----
  simulate:
    <<: *common
    container_name: bioneuron-simulate
    command: [
      "main.py", "simulate",
      "--symbol",  "${TRADE_SYMBOL:-BTCUSDT}",
      "--balance", "${SIM_BALANCE:-100000}",
      "--bars",    "${SIM_BARS:-500}"
    ]

  # ---- 正式交易 (需要明確啟用) ----
  trade:
    <<: *common
    container_name: bioneuron-trade
    profiles:
      - trade
    command: ["main.py", "trade", "--testnet"]   # 預設指向測試網; 移除 --testnet 改為正式網
    restart: unless-stopped           # 自動重啟，適合長時間運行
    stop_grace_period: 30s

volumes:
  bioneuron-data:
    driver: local
    driver_opts:
      type: none
      device: ${DATA_DIR:-./data}
      o: bind
  bioneuron-logs:
    driver: local
    driver_opts:
      type: none
      device: ${LOGS_DIR:-./logs}
      o: bind
